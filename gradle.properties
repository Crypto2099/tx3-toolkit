# The IntelliJ Platform bundles its own Kotlin stdlib; don't add ours to avoid
# classpath conflicts at runtime (recommended for IntelliJ Platform plugins).
kotlin.stdlib.default.dependency=false

# IntelliJ Platform Gradle Plugin 2.x reads/writes large artifacts; give the
# daemon room and opt into the configuration cache for faster incremental builds.
org.gradle.jvmargs=-Xmx2g -XX:MaxMetaspaceSize=768m
org.gradle.configuration-cache=false
